name: Refresh Sitemap

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * 1"

permissions:
  contents: write

jobs:
  refresh-sitemap:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    env:
      SITEMAP_API_BASE: ${{ vars.SITEMAP_API_BASE }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ravabroad/package-lock.json

      - name: Install frontend dependencies
        working-directory: ravabroad
        run: npm ci

      - name: Skip when sitemap API base is not configured
        if: env.SITEMAP_API_BASE == ''
        run: |
          echo "SITEMAP_API_BASE is not configured."
          echo "Add a GitHub repository variable named SITEMAP_API_BASE with your backend base URL."

      - name: Generate sitemap
        if: env.SITEMAP_API_BASE != ''
        working-directory: ravabroad
        run: npm run generate:sitemap

      - name: Commit refreshed sitemap
        if: env.SITEMAP_API_BASE != ''
        run: |
          if git diff --quiet -- ravabroad/public/sitemap.xml; then
            echo "No sitemap changes detected."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ravabroad/public/sitemap.xml
          git commit -m "Refresh sitemap"
          git push origin HEAD:main
